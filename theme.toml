run = { fg = "#d3d7ff", bg = "#070b17", bold = true }
desc = { fg = "#ff9e57", bg = "#070b17" }
hovered = { fg = "#070b17", bg = "#ff2ea6", bold = true }
footer = { fg = "#1a1024", bg = "#ff9e57", bold = true }

[filetype]
rules = [
  { mime = "inode/directory", fg = "#b026ff", bold = true },
  { mime = "image/*", fg = "#ff2ea6" },
  { mime = "{audio,video}/*", fg = "#8b7dff" },
  { mime = "application/{pdf,doc,rtf,odt,docx,xlsx,pptx}", fg = "#ffb36b", bold = true },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ff9e57", bold = true },
  { name = ".*", fg = "#6125e8" },
  { name = "*.{sh,bash,zsh,fish,ps1}", fg = "#39ff88", bold = true },
  { name = "*.{txt,md,rst,csv,*json*,toml,yml,yaml,xml,html,ini,cfg,conf,log,lua}", fg = "#d3d7ff" },
  { url = "*/", fg = "#b026ff", bold = true },
  { url = "*", fg = "#d3d7ff" },
  { name = "*/", fg = "#b026ff", bold = true },
  { name = "*", fg = "#d3d7ff" },
]

[icon]
dirs = [
  { name = "*", text = "󰉋", fg = "#b026ff" },
]
files = [
  { name = "*", text = "", fg = "#ff9e57" },
]
exts = [
  { name = "lua", text = "", fg = "#b026ff" },
  { name = "toml", text = "", fg = "#ff9e57" },
  { name = "md", text = "󰍔", fg = "#ffb36b" },
  { name = "sh", text = "", fg = "#39ff88" },
]
conds = [
  { if = "dir", text = "󰉋", fg = "#b026ff" },
]
